openapi: 3.0.3
info:
  title: RestAtlas API
  version: 0.1.0
  description: Backend API for RestAtlas — Visual OpenAPI Explorer

servers:
  - url: http://localhost:3000/api
    description: Local Development

paths:
  /specs:
    post:
      operationId: uploadSpec
      summary: Upload an OpenAPI specification
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                url:
                  type: string
                  format: uri
          application/json:
            schema:
              type: object
              description: Raw OpenAPI spec as JSON
      responses:
        '201':
          description: Spec uploaded and parsed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecSummary'
        '400':
          $ref: '#/components/responses/ValidationError'

  /specs/{id}:
    get:
      operationId: getSpec
      summary: Get a stored specification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full spec with parsed metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParsedSpec'
        '404':
          $ref: '#/components/responses/NotFound'

  /proxy:
    post:
      operationId: proxyRequest
      summary: CORS proxy for Try-It-Out requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyRequest'
      responses:
        '200':
          description: Proxied response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyResponse'

  /health:
    get:
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  schemas:
    SpecSummary:
      type: object
      required: [id, title, version, endpointCount, schemaCount]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        version:
          type: string
        endpointCount:
          type: integer
        schemaCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ParsedSpec:
      type: object
      required: [id, raw, summary]
      properties:
        id:
          type: string
          format: uuid
        raw:
          type: object
          description: Original OpenAPI spec as JSON
        summary:
          $ref: '#/components/schemas/SpecSummary'

    ProxyRequest:
      type: object
      required: [method, url]
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          description: Request body (any type)

    ProxyResponse:
      type: object
      required: [status, headers]
      properties:
        status:
          type: integer
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          description: Response body (any type)
        durationMs:
          type: integer

    ValidationError:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
