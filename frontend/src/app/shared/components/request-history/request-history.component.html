@if (tryItOut.history().length > 0) {
	<div class="mt-3 border-t border-gray-200 pt-3">
		<div class="flex items-center justify-between mb-2">
			<h4 class="m-0 text-xs font-semibold text-gray-600 uppercase tracking-wide">History</h4>
			<button class="bg-transparent border-none text-red-600 cursor-pointer text-[0.7rem] hover:underline" (click)="tryItOut.clearHistory()">Clear</button>
		</div>
		@for (entry of tryItOut.history(); track entry.id; let i = $index) {
			<div
				class="flex items-center gap-1.5 py-1 px-1.5 rounded cursor-pointer text-xs mb-0.5 hover:bg-gray-100"
				[class.bg-blue-50]="tryItOut.selectedHistoryIndex() === i"
				(click)="onReplay(entry)"
			>
				<app-method-badge [method]="entry.request.method" size="xs" />
				<span class="font-mono text-[0.7rem] text-gray-700 overflow-hidden text-ellipsis whitespace-nowrap flex-1 min-w-0">{{ truncateUrl(entry.request.url) }}</span>
				<app-status-badge [status]="entry.response.status" size="xs" />
				@if (entry.response.durationMs != null) {
					<span class="text-[0.65rem] text-gray-400 shrink-0">{{ entry.response.durationMs }}ms</span>
				}
			</div>
		}
	</div>
}
