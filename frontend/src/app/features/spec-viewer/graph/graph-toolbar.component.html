<div class="flex items-center gap-3 flex-wrap mb-4">
	<input
		type="text"
		class="py-1.5 px-2.5 border border-gray-300 rounded text-[0.8rem] w-[220px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/15"
		placeholder="Search endpoints & schemas..."
		[value]="svc.searchQuery()"
		(input)="onSearch($event)"
	/>

	<div class="flex gap-1">
		@for (method of methods; track method) {
			<button
				type="button"
				class="border py-1 px-2 rounded-sm text-[0.7rem] font-semibold cursor-pointer transition-all"
				[class]="methodClasses(method)"
				(click)="svc.toggleMethod(method)"
			>{{ method }}</button>
		}
	</div>

	@if (svc.allTags().length > 0) {
		<div class="flex gap-1">
			@for (tag of svc.allTags(); track tag) {
				<button
					type="button"
					class="border py-0.5 px-2 rounded-xl text-[0.7rem] cursor-pointer transition-all"
					[class]="svc.selectedTags().has(tag) ? 'bg-indigo-700 text-white border-indigo-700' : 'border-indigo-200 bg-white text-indigo-700 hover:bg-indigo-50'"
					(click)="svc.toggleTag(tag)"
				>{{ tag }}</button>
			}
		</div>
	}

	@if (hasActiveFilters()) {
		<button
			type="button"
			class="bg-transparent border-none text-gray-500 text-xs cursor-pointer underline p-1 hover:text-gray-700"
			(click)="svc.clearFilters()"
		>Clear filters</button>
	}
</div>
