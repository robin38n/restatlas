<button
	type="button"
	class="flex items-center justify-center w-8 h-8 rounded-md border border-gray-200 bg-white/85 backdrop-blur-sm cursor-pointer text-slate-500 transition-colors duration-150 hover:bg-white hover:text-slate-800"
	(click)="toggle($event)"
	title="Edge legend"
>
	<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
		<title>Edge legend icon</title>
		<circle cx="12" cy="12" r="10"/>
		<path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
		<line x1="12" y1="17" x2="12.01" y2="17"/>
	</svg>
</button>
@if (open()) {
	<div
		class="absolute top-9 right-0 bg-white/90 backdrop-blur border border-gray-200 rounded-lg px-3.5 py-3 min-w-[180px] shadow-md"
		(click)="$event.stopPropagation()"
	>
		<div class="text-[11px] font-semibold text-slate-800 mb-2 uppercase tracking-wide">
			Edge Types
		</div>
		@for (entry of entries; track entry.label) {
			<div class="flex items-center gap-2 py-0.5">
				<svg width="32" height="12" viewBox="0 0 32 12">
					<title>{{ entry.label }} edge style</title>
					<line
						x1="0" y1="6" x2="24" y2="6"
						[attr.stroke]="entry.color"
						stroke-width="2"
						[attr.stroke-dasharray]="entry.dash || 'none'"
					/>
					<polygon
						points="24,3 30,6 24,9"
						[attr.fill]="entry.color"
					/>
				</svg>
				<span class="text-xs text-slate-600">{{ entry.label }}</span>
			</div>
		}
	</div>
}
